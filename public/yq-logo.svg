<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C9FF;stop-opacity:1" />
    </linearGradient>
    
    <filter id="dropShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Upper left diagonal of checkmark -->
  <path d="M 80 280 Q 100 240 160 200 Q 180 190 200 210 Q 180 230 130 280 Z" fill="url(#logoGradient)" filter="url(#dropShadow)"/>
  
  <!-- Lower right diagonal of checkmark -->
  <path d="M 160 200 Q 200 250 300 100 Q 320 80 340 100 Q 290 280 180 330 Z" fill="url(#logoGradient)" filter="url(#dropShadow)"/>
  
  <!-- Vertical stem (I part) -->
  <rect x="240" y="280" width="80" height="240" rx="40" fill="url(#logoGradient)" filter="url(#dropShadow)"/>
  
  <!-- Q outer circle -->
  <circle cx="420" cy="300" r="120" fill="url(#logoGradient)" filter="url(#dropShadow)"/>
  
  <!-- Q inner hole -->
  <circle cx="420" cy="300" r="70" fill="white"/>
  
  <!-- Q tail -->
  <path d="M 480 380 Q 520 420 540 480 Q 545 495 530 500 Q 510 450 470 410 Z" fill="url(#logoGradient)" filter="url(#dropShadow)"/>
</svg>
